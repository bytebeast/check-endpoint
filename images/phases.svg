<svg width="100%" viewBox="0 0 680 335" role="img" xmlns="http://www.w3.org/2000/svg">
<title>HTTP request phase timing breakdown</title>
<desc>Stacked horizontal bar showing time breakdown across HTTP phases matching output column names: DNS, TCP CONNECT, TLS HANDSHAKE, PRE-TRANSFER, 1ST BYTE, and BODY DL.</desc>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="335" fill="#1e1e2e" rx="10"/>
<text x="340" y="37" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="#cdd6f4" letter-spacing="0.4">check-endpoint.py — HTTP request phase breakdown</text>
<rect x="60"  y="148" width="28"  height="50" rx="3" fill="#89dceb"/>
<rect x="90"  y="148" width="78"  height="50" rx="3" fill="#74c7ec"/>
<rect x="170" y="148" width="112" height="50" rx="3" fill="#cba6f7"/>
<rect x="284" y="148" width="16"  height="50" rx="2" fill="#585b70"/>
<rect x="302" y="148" width="196" height="50" rx="3" fill="#fab387"/>
<rect x="500" y="148" width="120" height="50" rx="3" fill="#a6e3a1"/>
<circle cx="74"  cy="148" r="3.5" fill="#89dceb"/>
<line x1="74"  y1="145" x2="74"  y2="113" stroke="#89dceb" stroke-width="0.9" stroke-dasharray="3 2.5"/>
<text x="64"  y="99"  font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#89dceb" text-anchor="start">DNS</text>
<text x="64"  y="113" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="10" fill="#a6adc8" text-anchor="start">hostname → IP</text>
<circle cx="226" cy="148" r="3.5" fill="#cba6f7"/>
<line x1="226" y1="145" x2="226" y2="113" stroke="#cba6f7" stroke-width="0.9" stroke-dasharray="3 2.5"/>
<text x="226" y="99"  font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#cba6f7" text-anchor="middle">TLS HANDSHAKE</text>
<text x="226" y="113" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="10" fill="#a6adc8" text-anchor="middle">cipher + cert exchange</text>
<circle cx="400" cy="148" r="3.5" fill="#fab387"/>
<line x1="400" y1="145" x2="400" y2="113" stroke="#fab387" stroke-width="0.9" stroke-dasharray="3 2.5"/>
<text x="400" y="99"  font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#fab387" text-anchor="middle">1ST BYTE</text>
<text x="400" y="113" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="10" fill="#a6adc8" text-anchor="middle">server processes request</text>
<circle cx="129" cy="198" r="3.5" fill="#74c7ec"/>
<line x1="129" y1="201" x2="129" y2="233" stroke="#74c7ec" stroke-width="0.9" stroke-dasharray="3 2.5"/>
<text x="129" y="245" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#74c7ec" text-anchor="middle">TCP CONNECT</text>
<text x="129" y="259" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="10" fill="#a6adc8" text-anchor="middle">SYN · SYN-ACK · ACK</text>
<circle cx="292" cy="198" r="3.5" fill="#585b70"/>
<line x1="292" y1="201" x2="312" y2="233" stroke="#585b70" stroke-width="0.9" stroke-dasharray="3 2.5"/>
<text x="316" y="245" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#7f849c" text-anchor="start">PRE-TRANSFER</text>
<text x="316" y="259" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="10" fill="#585b70" text-anchor="start">client-side ready</text>
<circle cx="560" cy="198" r="3.5" fill="#a6e3a1"/>
<line x1="560" y1="201" x2="560" y2="233" stroke="#a6e3a1" stroke-width="0.9" stroke-dasharray="3 2.5"/>
<text x="560" y="245" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#a6e3a1" text-anchor="middle">BODY DL</text>
<text x="560" y="259" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="10" fill="#a6adc8" text-anchor="middle">data in flight</text>
<line x1="60"  y1="278" x2="620" y2="278" stroke="#313244" stroke-width="1"/>
<line x1="60"  y1="272" x2="60"  y2="278" stroke="#313244" stroke-width="1"/>
<line x1="620" y1="272" x2="620" y2="278" stroke="#313244" stroke-width="1"/>
<text x="340" y="294" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="11" fill="#45475a" text-anchor="middle" letter-spacing="2">TOTAL TIME</text>
<text x="340" y="318" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="10" fill="#313244" text-anchor="middle" font-style="italic">REDIRECT time is also included in TOTAL TIME when redirects are followed</text>
</svg>
