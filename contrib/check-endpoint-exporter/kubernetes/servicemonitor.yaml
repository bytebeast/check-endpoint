# Requires the Prometheus Operator CRDs (monitoring.coreos.com).
# Apply this INSTEAD of the prometheus.io annotations on the Service.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: check-endpoint-exporter
  labels:
    app.kubernetes.io/name: check-endpoint-exporter
    # Add whatever label your Prometheus's serviceMonitorSelector matches, e.g.:
    # release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: check-endpoint-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
