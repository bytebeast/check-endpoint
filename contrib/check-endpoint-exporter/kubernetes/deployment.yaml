# Plain manifests for users who do not use Helm.
# Edit the two lines marked "<-- edit" before applying.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: check-endpoint-exporter
  labels:
    app.kubernetes.io/name: check-endpoint-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: check-endpoint-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: check-endpoint-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: ghcr.io/OWNER/check-endpoint-exporter:latest   # <-- edit
          args:
            - --prometheus
            - --prometheus-bind
            - 0.0.0.0
            - --prometheus-port
            - "9109"
            - -c
            - "1"
            - "https://example.com"                  # <-- edit: URL to probe
          ports:
            - name: metrics
              containerPort: 9109
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
